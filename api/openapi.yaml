openapi: 3.1.0
info:
  contact:
    name: GriffNode Developers
    url: https://griffnode.com
  description: |
    Accept Bitcoin, Litecoin, Dogecoin, Dash, Ethereum and ERC-20 tokens. Server-to-server, authenticated with a secret API key (`Authorization: Bearer sk_live_…` for live, or `sk_test_…` for test mode — same base URL). All monetary amounts in API responses are JSON numbers; **webhook** amounts are strings to preserve decimal precision (see the `webhooks` section).

    **Rate limits.** Every request is rate-limited per API key in two windows — per minute and per hour — by plan tier (min/hour): starter 30/500, business 100/2000, professional 300/5000, enterprise 1000/20000. Every response carries `X-RateLimit-Limit`, `X-RateLimit-Remaining` and `X-RateLimit-Reset` (Unix seconds) for the per-minute window. On `429` the body is `error: "RATE_LIMIT_EXCEEDED"` (either window) with a `Retry-After` header (seconds) — clients should retry after it. A separate `429` with `error: "MONTHLY_LIMIT_REACHED"` means the plan's monthly transaction quota (not the request rate).
  license:
    name: Apache-2.0
  title: GriffNode API
  version: 1.0.1
servers:
- description: |
    Single base URL for both live and test traffic. A live secret key (`sk_live_`) settles real funds on mainnet; a test secret key (`sk_test_`) runs in test mode with no real funds. There is no separate sandbox host.
  url: https://api.griffnode.com/v1
security:
- SecretKey: []
tags:
- description: Create and read merchant payment transactions.
  name: Transactions
- description: Live prices and the supported-currency catalogue.
  name: Market Data
- description: "Merchant plan, usage, balances, stats and invoices."
  name: Account
- description: Plan upgrades and account top-ups.
  name: Billing
- description: Health and hosted-checkout redirect.
  name: System
paths:
  /health:
    get:
      operationId: getHealth
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getHealth_200_response'
          description: Service status (intentionally NOT wrapped in the success envelope).
      security: []
      summary: API health check
      tags:
      - System
  /pay:
    get:
      description: |
        Browser-facing redirect to the hosted payment page, authenticated by a **publishable** key in the query string (safe to expose client-side). Not used by the server-side SDKs — included for completeness.
      operationId: hostedCheckoutRedirect
      parameters:
      - description: "Publishable key, pk_live_… / pk_test_…"
        explode: true
        in: query
        name: pk
        required: true
        schema:
          type: string
        style: form
      - description: Fiat amount (≥ 1.00 USD equivalent).
        explode: true
        in: query
        name: amount
        required: true
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: crypto
        required: true
        schema:
          $ref: '#/components/schemas/CryptoSymbol'
        style: form
      - description: Payment-link slug for attribution.
        explode: true
        in: query
        name: link
        required: false
        schema:
          type: string
        style: form
      responses:
        "302":
          description: "Redirect to https://griffnode.com/transaction/{transaction_id}"
        "400":
          $ref: '#/components/responses/BadRequest'
      security: []
      summary: "Hosted-checkout redirect (browser flow, publishable key)"
      tags:
      - System
  /transactions/create:
    post:
      operationId: createTransaction
      parameters:
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTransactionRequest'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionEnvelope'
          description: Transaction created.
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "402":
          $ref: '#/components/responses/InsufficientBalance'
        "403":
          $ref: '#/components/responses/Forbidden'
        "409":
          $ref: '#/components/responses/ActiveTransactionExists'
        "429":
          $ref: '#/components/responses/TooManyRequests'
      summary: Create a payment transaction
      tags:
      - Transactions
  /transactions/create-detailed:
    post:
      operationId: createDetailedTransaction
      parameters:
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDetailedTransactionRequest'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionEnvelope'
          description: Transaction created.
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "402":
          $ref: '#/components/responses/InsufficientBalance'
        "403":
          $ref: '#/components/responses/Forbidden'
        "429":
          $ref: '#/components/responses/TooManyRequests'
      summary: Create an itemized transaction (Professional/Enterprise plans)
      tags:
      - Transactions
  /transactions/list:
    get:
      operationId: listTransactions
      parameters:
      - $ref: '#/components/parameters/Limit'
      - $ref: '#/components/parameters/Offset'
      - explode: true
        in: query
        name: status
        required: false
        schema:
          $ref: '#/components/schemas/TransactionStatus'
        style: form
      - explode: true
        in: query
        name: crypto
        required: false
        schema:
          $ref: '#/components/schemas/CryptoSymbol'
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/listTransactions_200_response'
          description: A page of transactions.
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
      summary: List the merchant's transactions (newest first)
      tags:
      - Transactions
  /transactions/{transaction_id}:
    get:
      operationId: getTransaction
      parameters:
      - explode: false
        in: path
        name: transaction_id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionEnvelope'
          description: The transaction.
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'
      summary: Retrieve a single transaction
      tags:
      - Transactions
  /prices:
    get:
      operationId: getPrices
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getPrices_200_response'
          description: Live rates.
        "401":
          $ref: '#/components/responses/Unauthorized'
        "500":
          $ref: '#/components/responses/ServerError'
      summary: Current crypto and fiat exchange rates (USD-denominated)
      tags:
      - Market Data
  /cryptos/list:
    get:
      operationId: listCryptocurrencies
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/listCryptocurrencies_200_response'
          description: Supported-currency catalogue.
        "401":
          $ref: '#/components/responses/Unauthorized'
      summary: All supported cryptocurrencies and tokens
      tags:
      - Market Data
  /merchant/cryptos:
    get:
      operationId: listMerchantCryptocurrencies
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/listCryptocurrencies_200_response'
          description: The merchant's configured currencies.
        "401":
          $ref: '#/components/responses/Unauthorized'
      summary: Cryptocurrencies this merchant has wallets configured for
      tags:
      - Market Data
  /account:
    get:
      operationId: getAccount
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getAccount_200_response'
          description: Account details.
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
      summary: "Merchant plan, usage and limits"
      tags:
      - Account
  /plans:
    get:
      operationId: listPlans
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/listPlans_200_response'
          description: Plans.
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
      summary: Plan catalogue and pricing
      tags:
      - Account
  /balances:
    get:
      operationId: listBalances
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/listBalances_200_response'
          description: Balances.
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
      summary: On-platform balances (for overage/top-up; NOT crypto settlement)
      tags:
      - Account
  /stats:
    get:
      operationId: getStats
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/getStats_200_response'
          description: Stats.
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
      summary: Merchant transaction analytics
      tags:
      - Account
  /invoices:
    get:
      operationId: listInvoices
      parameters:
      - $ref: '#/components/parameters/Limit'
      - $ref: '#/components/parameters/Offset'
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/listInvoices_200_response'
          description: Invoices.
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
      summary: GriffNode billing invoices (platform ↔ merchant)
      tags:
      - Account
  /billing/checkout:
    post:
      operationId: createBillingCheckout
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/createBillingCheckout_request'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionEnvelope'
          description: Billing transaction created.
        "401":
          $ref: '#/components/responses/Unauthorized'
        "402":
          $ref: '#/components/responses/InsufficientBalance'
        "403":
          $ref: '#/components/responses/Forbidden'
      summary: Start a plan upgrade or account top-up
      tags:
      - Billing
components:
  headers:
    X-RateLimit-Limit:
      description: Requests allowed per minute for this API key's plan tier.
      explode: false
      schema: {}
      style: simple
    X-RateLimit-Remaining:
      description: Requests remaining in the current one-minute window.
      explode: false
      schema: {}
      style: simple
    X-RateLimit-Reset:
      description: Unix time (seconds) when the current rate-limit window resets.
      explode: false
      schema:
        format: int64
      style: simple
    Retry-After:
      description: Seconds to wait before retrying (sent on 429 responses).
      explode: false
      schema: {}
      style: simple
  parameters:
    Limit:
      explode: true
      in: query
      name: limit
      required: false
      schema:
        default: 20
        maximum: 100
        minimum: 1
        type: integer
      style: form
    Offset:
      explode: true
      in: query
      name: offset
      required: false
      schema:
        default: 0
        minimum: 0
        type: integer
      style: form
    IdempotencyKey:
      description: |
        Optional unique key for a create request (e.g. a UUID). A retried create with the same key returns the original transaction instead of creating a duplicate — send it on every create so a network retry can't double-charge the customer.
      explode: false
      in: header
      name: X-Idempotency-Key
      required: false
      schema:
        type: string
      style: simple
  responses:
    BadRequest:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
      description: "Validation error (INVALID_REQUEST, INVALID_CRYPTO, INVALID_AMOUNT,\
        \ AMOUNT_TOO_LOW, INVALID_CURRENCY, INVALID_METADATA, WALLET_NOT_CONFIGURED,\
        \ MISSING_ITEMS, MISSING_ORDER_ID, …)."
    Unauthorized:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
      description: Missing or invalid API key (UNAUTHORIZED).
    Forbidden:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
      description: "Key lacks permission — e.g. a publishable key on a secret-only\
        \ endpoint, or plan too low (FORBIDDEN, USE_PAY_ENDPOINT, PLAN_UPGRADE_REQUIRED,\
        \ NO_ACTIVE_PLAN)."
    NotFound:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
      description: Resource not found (TRANSACTION_NOT_FOUND).
    InsufficientBalance:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
      description: Merchant platform balance too low for overage fees (INSUFFICIENT_BALANCE).
    ActiveTransactionExists:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/inline_object'
      description: This client IP already has an active transaction (ACTIVE_TRANSACTION_EXISTS).
        Body includes an `existing_transaction` object.
    TooManyRequests:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
      description: |
        Rate limit or quota exceeded. `error` is `RATE_LIMIT_EXCEEDED` (per-minute request rate — honour `Retry-After`) or `MONTHLY_LIMIT_REACHED` (the plan's monthly transaction quota). Rate-limit headers accompany the `RATE_LIMIT_EXCEEDED` case.
      headers:
        X-RateLimit-Limit:
          $ref: '#/components/headers/X-RateLimit-Limit'
        X-RateLimit-Remaining:
          $ref: '#/components/headers/X-RateLimit-Remaining'
        X-RateLimit-Reset:
          $ref: '#/components/headers/X-RateLimit-Reset'
        Retry-After:
          $ref: '#/components/headers/Retry-After'
    ServerError:
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
      description: "Internal error (RATE_FETCH_FAILED, ADDRESS_GENERATION_FAILED,\
        \ MIDAS_ERROR, …)."
  schemas:
    CryptoSymbol:
      description: Supported coin/token symbol. /cryptos/list is authoritative at
        runtime.
      enum:
      - BTC
      - LTC
      - DOGE
      - DASH
      - ETH
      - USDT
      - USDC
      - DAI
      - WBTC
      - SHIB
      - PEPE
      - LINK
      - UNI
      - AAVE
      - MKR
      type: string
    FiatCurrency:
      default: USD
      enum:
      - USD
      - PLN
      - EUR
      - GBP
      type: string
    TransactionStatus:
      description: Public transaction status (internal sub-states are mapped to these).
      enum:
      - pending
      - awaiting_confirmation
      - completed
      - partial
      - expired
      - failed
      type: string
    PlanTier:
      enum:
      - starter
      - business
      - professional
      - enterprise
      type: string
    Metadata:
      additionalProperties:
        type: string
      description: "Free-form key/value (≤20 keys, string values ≤500 chars, ≤4 KB\
        \ total)."
    LineItem:
      example:
        quantity: 1
        price: 2.027123023002322
        name: name
      properties:
        name:
          type: string
        quantity:
          default: 1
          minimum: 1
          type: integer
        price:
          type: number
      required:
      - name
      - price
    CreateTransactionRequest:
      example:
        amount: 0.8008281904610115
        metadata:
          key: metadata
        currency_fiat: USD
        customer_email: customer_email
        cancel_url: https://openapi-generator.tech
        crypto: BTC
        success_url: https://openapi-generator.tech
      properties:
        crypto:
          $ref: '#/components/schemas/CryptoSymbol'
        amount:
          description: Fiat amount (≥ 1.00 USD equivalent).
          type: number
        currency_fiat:
          $ref: '#/components/schemas/FiatCurrency'
        metadata:
          additionalProperties:
            type: string
          description: "Free-form key/value (≤20 keys, string values ≤500 chars, ≤\
            4 KB total)."
        customer_email:
          format: email
          nullable: true
          type: string
        success_url:
          format: uri
          nullable: true
          type: string
        cancel_url:
          format: uri
          nullable: true
          type: string
      required:
      - amount
      - crypto
    CreateDetailedTransactionRequest:
      example:
        metadata:
          key: metadata
        currency_fiat: USD
        customer_email: customer_email
        items:
        - quantity: 1
          price: 2.027123023002322
          name: name
        - quantity: 1
          price: 2.027123023002322
          name: name
        order_id: order_id
        cancel_url: https://openapi-generator.tech
        crypto: BTC
        success_url: https://openapi-generator.tech
      properties:
        crypto:
          $ref: '#/components/schemas/CryptoSymbol'
        currency_fiat:
          $ref: '#/components/schemas/FiatCurrency'
        items:
          items:
            $ref: '#/components/schemas/LineItem'
          minItems: 1
          type: array
        order_id:
          type: string
        metadata:
          additionalProperties:
            type: string
          description: "Free-form key/value (≤20 keys, string values ≤500 chars, ≤\
            4 KB total)."
        customer_email:
          format: email
          nullable: true
          type: string
        success_url:
          format: uri
          nullable: true
          type: string
        cancel_url:
          format: uri
          nullable: true
          type: string
      required:
      - crypto
      - items
      - order_id
    PaymentSplit:
      description: One on-chain payment toward the transaction.
      example:
        detected_at: 2000-01-23T04:56:07.000+00:00
        txid: txid
        amount_crypto: 4.145608029883936
        confirmations: 7
        confirmed_at: 2000-01-23T04:56:07.000+00:00
        status: status
      properties:
        txid:
          description: "On-chain transaction hash (blockchain id, NOT the GriffNode\
            \ transaction_id)."
          type: string
        amount_crypto:
          type: number
        confirmations:
          type: integer
        status:
          type: string
        detected_at:
          format: date-time
          type: string
        confirmed_at:
          format: date-time
          nullable: true
          type: string
    Transaction:
      description: |
        The canonical, curated public view of a transaction (same shape from create, get and list). Internal fields (capability tokens, client_ip, address_index, derivation/db internals) are deliberately NOT exposed.
      example:
        amount_paid: 5.962133916683182
        amount_remaining: 5.637376656633329
        payment_url: https://openapi-generator.tech
        metadata:
          key: metadata
        deposit_address: deposit_address
        payments:
        - detected_at: 2000-01-23T04:56:07.000+00:00
          txid: txid
          amount_crypto: 4.145608029883936
          confirmations: 7
          confirmed_at: 2000-01-23T04:56:07.000+00:00
          status: status
        - detected_at: 2000-01-23T04:56:07.000+00:00
          txid: txid
          amount_crypto: 4.145608029883936
          confirmations: 7
          confirmed_at: 2000-01-23T04:56:07.000+00:00
          status: status
        amount_usd: 1.4658129805029452
        created_at: 2000-01-23T04:56:07.000+00:00
        type: basic
        confirmations_required: 9
        fiat_to_usd_rate: 2.3021358869347655
        expires_at: 2000-01-23T04:56:07.000+00:00
        updated_at: 2000-01-23T04:56:07.000+00:00
        amount_crypto: 0.8008281904610115
        success_url: success_url
        transaction_id: transaction_id
        exchange_rate: 7.061401241503109
        crypto: BTC
        amount_fiat: 6.027456183070403
        currency_fiat: USD
        customer_email: customer_email
        order_id: order_id
        items:
        - quantity: 1
          price: 2.027123023002322
          name: name
        - quantity: 1
          price: 2.027123023002322
          name: name
        cancel_url: cancel_url
        status: pending
      properties:
        transaction_id:
          type: string
        status:
          $ref: '#/components/schemas/TransactionStatus'
        type:
          enum:
          - basic
          - detailed
          type: string
        crypto:
          $ref: '#/components/schemas/CryptoSymbol'
        deposit_address:
          type: string
        amount_crypto:
          type: number
        amount_fiat:
          type: number
        amount_usd:
          type: number
        amount_paid:
          type: number
        amount_remaining:
          type: number
        currency_fiat:
          $ref: '#/components/schemas/FiatCurrency'
        fiat_to_usd_rate:
          type: number
        exchange_rate:
          description: "USD per unit of crypto, locked at creation."
          type: number
        confirmations_required:
          type: integer
        payment_url:
          format: uri
          type: string
        order_id:
          nullable: true
          type: string
        customer_email:
          nullable: true
          type: string
        items:
          items:
            $ref: '#/components/schemas/LineItem'
          nullable: true
          type: array
        payments:
          description: On-chain payments detected toward this transaction.
          items:
            $ref: '#/components/schemas/PaymentSplit'
          type: array
        metadata:
          additionalProperties:
            type: string
          description: "Free-form key/value (≤20 keys, string values ≤500 chars, ≤\
            4 KB total)."
        success_url:
          nullable: true
          type: string
        cancel_url:
          nullable: true
          type: string
        created_at:
          format: date-time
          type: string
        updated_at:
          format: date-time
          type: string
        expires_at:
          format: date-time
          type: string
      required:
      - amount_fiat
      - amount_usd
      - created_at
      - crypto
      - currency_fiat
      - expires_at
      - status
      - transaction_id
    TransactionEnvelope:
      example:
        data:
          amount_paid: 5.962133916683182
          amount_remaining: 5.637376656633329
          payment_url: https://openapi-generator.tech
          metadata:
            key: metadata
          deposit_address: deposit_address
          payments:
          - detected_at: 2000-01-23T04:56:07.000+00:00
            txid: txid
            amount_crypto: 4.145608029883936
            confirmations: 7
            confirmed_at: 2000-01-23T04:56:07.000+00:00
            status: status
          - detected_at: 2000-01-23T04:56:07.000+00:00
            txid: txid
            amount_crypto: 4.145608029883936
            confirmations: 7
            confirmed_at: 2000-01-23T04:56:07.000+00:00
            status: status
          amount_usd: 1.4658129805029452
          created_at: 2000-01-23T04:56:07.000+00:00
          type: basic
          confirmations_required: 9
          fiat_to_usd_rate: 2.3021358869347655
          expires_at: 2000-01-23T04:56:07.000+00:00
          updated_at: 2000-01-23T04:56:07.000+00:00
          amount_crypto: 0.8008281904610115
          success_url: success_url
          transaction_id: transaction_id
          exchange_rate: 7.061401241503109
          crypto: BTC
          amount_fiat: 6.027456183070403
          currency_fiat: USD
          customer_email: customer_email
          order_id: order_id
          items:
          - quantity: 1
            price: 2.027123023002322
            name: name
          - quantity: 1
            price: 2.027123023002322
            name: name
          cancel_url: cancel_url
          status: pending
        success: ""
      properties:
        success: {}
        data:
          $ref: '#/components/schemas/Transaction'
      required:
      - data
      - success
    Cryptocurrency:
      example:
        symbol: BTC
        blockchain: blockchain
        name: name
        type: coin
        network: network
      properties:
        symbol:
          $ref: '#/components/schemas/CryptoSymbol'
        name:
          type: string
        blockchain:
          type: string
        network:
          type: string
        type:
          enum:
